name: Dependency Review

# Requires Dependency graph / Dependabot data for the repository (enabled by default on many public repos).
# If this job fails with configuration errors, enable "Dependency graph" in repo Settings → Code security.

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
